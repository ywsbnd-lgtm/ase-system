<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASE - Adaptive Systems Ecosystem</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0e27;
            color: #e0e0e0;
            line-height: 1.6;
            padding: 1rem;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 2rem;
            text-align: center;
            border-bottom: 1px solid #1a1f3a;
            padding-bottom: 1rem;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #7a7a8e;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* INPUT FORM */
        .input-section {
            background: #0f1629;
            border: 1px solid #1a1f3a;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #7a7a8e;
            margin-bottom: 0.4rem;
            font-weight: 600;
        }

        input[type="text"],
        textarea {
            background: #0a0e27;
            border: 1px solid #1a1f3a;
            border-radius: 4px;
            padding: 0.8rem;
            color: #e0e0e0;
            font-family: inherit;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #4a9eff;
            box-shadow: 0 0 0 2px rgba(74, 158, 255, 0.1);
        }

        textarea {
            min-height: 60px;
            resize: vertical;
        }

        /* BUTTONS */
        .button-group {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
        }

        button {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }

        .btn-submit {
            background: #4a9eff;
            color: #fff;
            flex: 1;
            max-width: 200px;
        }

        .btn-submit:hover {
            background: #3a8eef;
            transform: translateY(-1px);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: transparent;
            color: #7a7a8e;
            border: 1px solid #1a1f3a;
        }

        .btn-secondary:hover {
            border-color: #4a9eff;
            color: #4a9eff;
        }

        .btn-danger {
            background: transparent;
            color: #ff6b6b;
            border: 1px solid #ff6b6b;
        }

        .btn-danger:hover {
            background: rgba(255, 107, 107, 0.1);
        }

        /* JSON OUTPUT */
        .output-section {
            background: #0f1629;
            border: 1px solid #1a1f3a;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 2rem;
            display: none;
        }

        .output-section.active {
            display: block;
        }

        .output-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #7a7a8e;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }

        .json-output {
            background: #0a0e27;
            border: 1px solid #1a1f3a;
            border-radius: 4px;
            padding: 1rem;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            color: #4a9eff;
            overflow-x: auto;
            word-break: break-word;
            white-space: pre-wrap;
        }

        /* HISTORY SECTION */
        .history-section {
            margin-top: 2rem;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            border-bottom: 1px solid #1a1f3a;
            padding-bottom: 1rem;
        }

        .history-title {
            font-size: 1.1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .history-count {
            font-size: 0.8rem;
            color: #7a7a8e;
            background: #0f1629;
            padding: 0.3rem 0.8rem;
            border-radius: 4px;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .history-item {
            background: #0f1629;
            border: 1px solid #1a1f3a;
            border-radius: 8px;
            padding: 1rem;
            transition: all 0.2s;
        }

        .history-item:hover {
            border-color: #4a9eff;
            background: rgba(74, 158, 255, 0.05);
        }

        .entry-timestamp {
            font-size: 0.75rem;
            color: #7a7a8e;
            margin-bottom: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .entry-fields {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
        }

        .field-display {
            border-left: 3px solid #4a9eff;
            padding-left: 0.8rem;
        }

        .field-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #7a7a8e;
            margin-bottom: 0.3rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .field-value {
            font-size: 0.9rem;
            color: #e0e0e0;
            word-break: break-word;
        }

        .field-empty {
            color: #3a3a4a;
            font-style: italic;
            font-size: 0.85rem;
        }

        /* Field Colors */
        .field-G { border-left-color: #ff6b6b; } /* Growth - Red */
        .field-T { border-left-color: #4ecdc4; } /* Trading - Teal */
        .field-S { border-left-color: #ffe66d; } /* System - Yellow */
        .field-V { border-left-color: #a78bfa; } /* VOID - Purple */
        .field-C { border-left-color: #4a9eff; } /* Cyber - Blue */

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #7a7a8e;
        }

        .empty-state p {
            font-size: 0.9rem;
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            body {
                padding: 0.8rem;
            }

            h1 {
                font-size: 1.4rem;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }

            .btn-submit {
                max-width: none;
            }

            .entry-fields {
                grid-template-columns: 1fr;
            }

            .input-section,
            .output-section,
            .history-item {
                padding: 1rem;
            }
        }

        /* KEYBOARD HINT */
        .keyboard-hint {
            font-size: 0.65rem;
            color: #3a3a4a;
            margin-top: 0.3rem;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚙️ ASE</h1>
            <p class="subtitle">Adaptive Systems Ecosystem</p>
        </header>

        <!-- INPUT FORM -->
        <div class="input-section">
            <form id="aseForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="inputG">Growth</label>
                        <textarea id="inputG" placeholder="Income, progress, execution..." autofocus></textarea>
                        <div class="keyboard-hint">Income • Progress • Execution</div>
                    </div>
                    <div class="form-group">
                        <label for="inputT">Trading</label>
                        <textarea id="inputT" placeholder="Market analysis, decisions..."></textarea>
                        <div class="keyboard-hint">Market • Analysis • Decisions</div>
                    </div>
                    <div class="form-group">
                        <label for="inputS">System</label>
                        <textarea id="inputS" placeholder="Improvements, automation, upgrades..."></textarea>
                        <div class="keyboard-hint">Improvements • Automation • Upgrades</div>
                    </div>
                    <div class="form-group">
                        <label for="inputV">VOID</label>
                        <textarea id="inputV" placeholder="World observation, insights, trends..."></textarea>
                        <div class="keyboard-hint">Observation • Insights • Trends</div>
                    </div>
                    <div class="form-group">
                        <label for="inputC">Cyber</label>
                        <textarea id="inputC" placeholder="Security checks, system health..."></textarea>
                        <div class="keyboard-hint">Security • Health • Monitoring</div>
                    </div>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn-submit">Submit Entry</button>
                    <button type="reset" class="btn-secondary">Clear</button>
                </div>
            </form>
        </div>

        <!-- JSON OUTPUT -->
        <div class="output-section" id="outputSection">
            <div class="output-label">Last Entry (JSON)</div>
            <div class="json-output" id="jsonOutput"></div>
        </div>

        <!-- HISTORY -->
        <div class="history-section">
            <div class="history-header">
                <span class="history-title">📋 History</span>
                <div style="display: flex; gap: 0.8rem; align-items: center;">
                    <span class="history-count" id="historyCount">0 entries</span>
                    <button class="btn-danger" id="clearHistoryBtn">Clear All</button>
                </div>
            </div>
            <div class="history-list" id="historyList">
                <div class="empty-state">
                    <p>No entries yet. Start by submitting your first entry above.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // DATA MANAGEMENT
        // ============================================
        const STORAGE_KEY = 'ase_entries';
        const FIELDS = ['G', 'T', 'S', 'V', 'C'];

        class ASEDataStore {
            constructor() {
                this.entries = this.loadFromStorage();
            }

            loadFromStorage() {
                const stored = localStorage.getItem(STORAGE_KEY);
                return stored ? JSON.parse(stored) : [];
            }

            saveToStorage() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(this.entries));
            }

            addEntry(data) {
                const entry = {
                    id: this.generateId(),
                    G: data.G || '',
                    T: data.T || '',
                    S: data.S || '',
                    V: data.V || '',
                    C: data.C || '',
                    timestamp: new Date().toISOString()
                };
                this.entries.unshift(entry); // Latest first
                this.saveToStorage();
                return entry;
            }

            getEntries() {
                return this.entries;
            }

            clearAll() {
                this.entries = [];
                this.saveToStorage();
            }

            generateId() {
                return `ase_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
            }
        }

        // ============================================
        // UI RENDERING
        // ============================================
        class ASEUIRenderer {
            static formatTimestamp(isoString) {
                const date = new Date(isoString);
                const now = new Date();
                const diffMs = now - date;
                const diffMins = Math.floor(diffMs / 60000);
                const diffHours = Math.floor(diffMs / 3600000);
                const diffDays = Math.floor(diffMs / 86400000);

                if (diffMins < 1) return 'Just now';
                if (diffMins < 60) return `${diffMins}m ago`;
                if (diffHours < 24) return `${diffHours}h ago`;
                if (diffDays < 7) return `${diffDays}d ago`;

                return date.toLocaleDateString('en-US', {
                    month: 'short',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            }

            static renderJSONOutput(entry) {
                const json = JSON.stringify({
                    id: entry.id,
                    G: entry.G,
                    T: entry.T,
                    S: entry.S,
                    V: entry.V,
                    C: entry.C,
                    timestamp: entry.timestamp
                }, null, 2);
                document.getElementById('jsonOutput').textContent = json;
                document.getElementById('outputSection').classList.add('active');
            }

            static renderHistoryItem(entry) {
                const item = document.createElement('div');
                item.className = 'history-item';

                const timestamp = document.createElement('div');
                timestamp.className = 'entry-timestamp';
                timestamp.textContent = this.formatTimestamp(entry.timestamp);

                const fields = document.createElement('div');
                fields.className = 'entry-fields';

                FIELDS.forEach(field => {
                    const fieldDiv = document.createElement('div');
                    fieldDiv.className = `field-display field-${field}`;

                    const label = document.createElement('div');
                    label.className = 'field-label';
                    label.textContent = field;

                    const value = document.createElement('div');
                    value.className = 'field-value';

                    if (entry[field]) {
                        value.textContent = entry[field];
                    } else {
                        value.className = 'field-value field-empty';
                        value.textContent = '—';
                    }

                    fieldDiv.appendChild(label);
                    fieldDiv.appendChild(value);
                    fields.appendChild(fieldDiv);
                });

                item.appendChild(timestamp);
                item.appendChild(fields);

                return item;
            }

            static renderHistory(entries) {
                const historyList = document.getElementById('historyList');
                const historyCount = document.getElementById('historyCount');

                if (entries.length === 0) {
                    historyList.innerHTML = '<div class="empty-state"><p>No entries yet. Start by submitting your first entry above.</p></div>';
                    historyCount.textContent = '0 entries';
                    return;
                }

                historyList.innerHTML = '';
                entries.forEach(entry => {
                    historyList.appendChild(this.renderHistoryItem(entry));
                });

                const pluralLabel = entries.length === 1 ? 'entry' : 'entries';
                historyCount.textContent = `${entries.length} ${pluralLabel}`;
            }
        }

        // ============================================
        // APPLICATION LOGIC
        // ============================================
        class ASEApp {
            constructor() {
                this.dataStore = new ASEDataStore();
                this.form = document.getElementById('aseForm');
                this.inputs = {
                    G: document.getElementById('inputG'),
                    T: document.getElementById('inputT'),
                    S: document.getElementById('inputS'),
                    V: document.getElementById('inputV'),
                    C: document.getElementById('inputC')
                };
                this.clearHistoryBtn = document.getElementById('clearHistoryBtn');

                this.init();
            }

            init() {
                this.attachEventListeners();
                this.renderUI();
                this.setupKeyboardShortcuts();
            }

            attachEventListeners() {
                this.form.addEventListener('submit', (e) => this.handleSubmit(e));
                this.clearHistoryBtn.addEventListener('click', () => this.handleClearHistory());
            }

            setupKeyboardShortcuts() {
                // Tab navigation between fields
                const fieldIds = ['inputG', 'inputT', 'inputS', 'inputV', 'inputC'];

                fieldIds.forEach((id, index) => {
                    const input = document.getElementById(id);
                    input.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter' && e.ctrlKey) {
                            this.handleSubmit(e);
                        }
                    });
                });

                // Cmd+Enter or Ctrl+Enter to submit from any field
                document.addEventListener('keydown', (e) => {
                    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                        this.handleSubmit(e);
                    }
                });
            }

            handleSubmit(e) {
                e.preventDefault();

                const data = {
                    G: this.inputs.G.value.trim(),
                    T: this.inputs.T.value.trim(),
                    S: this.inputs.S.value.trim(),
                    V: this.inputs.V.value.trim(),
                    C: this.inputs.C.value.trim()
                };

                // Check if at least one field has content
                const hasContent = Object.values(data).some(val => val.length > 0);
                if (!hasContent) {
                    alert('Please fill at least one field.');
                    return;
                }

                // Add entry and update UI
                const entry = this.dataStore.addEntry(data);
                this.renderUI();

                // Clear form and refocus first input
                this.form.reset();
                this.inputs.G.focus();
            }

            handleClearHistory() {
                if (confirm('Are you sure? This will delete all entries permanently.')) {
                    this.dataStore.clearAll();
                    this.renderUI();
                }
            }

            renderUI() {
                const entries = this.dataStore.getEntries();

                if (entries.length > 0) {
                    ASEUIRenderer.renderJSONOutput(entries[0]);
                }

                ASEUIRenderer.renderHistory(entries);
            }
        }

        // ============================================
        // INITIALIZE APP
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            new ASEApp();
        });
    </script>
</body>
</html>
